name: Prepare release

description: >-
  Opens a release PR that finalizes CHANGELOG.md for the given tag.
  After merge, publish-release.yml takes over.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag WITH "v" prefix (e.g. v1.2.0, v1.2.0-beta.1)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  create-release-pr:
    uses: AdGuardSoftwareLimited/actions/.github/workflows/create-release-pr.yml@master
    with:
      tag: ${{ inputs.tag }}
      team: extensions
