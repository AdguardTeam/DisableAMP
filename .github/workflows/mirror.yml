name: Mirror

description: Mirrors code to the public repo on every push to master.

on:
  push:
    branches:
      - master

permissions:
  contents: read
  actions: write
  id-token: write

jobs:
  mirror:
    uses: AdGuardSoftwareLimited/actions/.github/workflows/mirror.yml@master
    with:
      team: extensions
      target_repo: git@github.com:AdguardTeam/DisableAMP.git
    secrets: inherit
