name: Publish release

description: >-
  Tags the release commit, builds, tests, deploys the compiled userscript to
  userscripts.adtidy.org and to a GitHub Release, mirrors the release to the
  public repo (AdguardTeam/DisableAMP), then notifies Slack.
  Beta tags (e.g. v1.0.0-beta.1) deploy only to the beta channel.
  Stable tags (e.g. v1.0.0) deploy only to the release channel.

on:
  pull_request:
    types: [closed]
    branches: [master]
  workflow_dispatch:
    inputs:
      ref:
        description: Ref to publish manually
        required: false
        type: string

jobs:
  tag:
    uses: AdGuardSoftwareLimited/actions/.github/workflows/tag-from-changelog.yml@master
    with:
      ref: ${{ inputs.ref || github.event.pull_request.merge_commit_sha || github.ref_name }}
      team: extensions
    # `contents: write` — create the git tag
    permissions:
      contents: write

  build:
    name: Test and build
    needs: tag
    runs-on: team-extensions
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.event.pull_request.merge_commit_sha || github.ref_name }}

      # Version is parsed from CHANGELOG by the tag job and injected
      # here so the compiled userscript metadata carries the release tag.
      - name: Inject version into package.json
        run: npm pkg set version="${{ needs.tag.outputs.version }}"

      - name: Lint and test
        run: DOCKER_BUILDKIT=1 docker build --progress plain --target test-output .

      - name: Build release artifacts
        run: DOCKER_BUILDKIT=1 docker build --progress plain --target build-output --output ./artifacts .

      - name: Upload userscript artifacts
        uses: actions/upload-artifact@v7
        with:
          name: userscript
          path: |
            artifacts/disable-amp.user.js
            artifacts/disable-amp.meta.js

  deploy-static:
    # Deploys to the beta channel for beta tags (with `-beta` suffix)
    # or to the release channel for stable tags.
    needs: [tag, build]
    uses: AdGuardSoftwareLimited/actions/.github/workflows/deploy-to-static.yml@master
    with:
      team: extensions
      deployer-module: ${{ contains(needs.tag.outputs.tag, '-beta') && 'disable-amp-beta' || 'disable-amp-release' }}
      artifact-pattern: userscript
      file-mappings: '${{ contains(needs.tag.outputs.tag, ''-beta'') && ''{"disable-amp-beta.user.js": "disable-amp.user.js", "disable-amp-beta.meta.js": "disable-amp.meta.js"}'' || ''{"disable-amp.user.js": "disable-amp.user.js", "disable-amp.meta.js": "disable-amp.meta.js"}'' }}'
      environment: ${{ contains(needs.tag.outputs.tag, '-beta') && 'beta-static' || 'production-static' }}
    # `contents: read` — download artifact only
    permissions:
      contents: read

  mirror-and-release:
    # Mirrors the repo (including the tag) to the public mirror and
    # creates a matching GitHub Release on AdguardTeam/DisableAMP.
    needs: [tag, build]
    uses: AdGuardSoftwareLimited/actions/.github/workflows/mirror-and-release.yml@master
    with:
      team: extensions
      target_repo: AdguardTeam/DisableAMP
      tag: ${{ needs.tag.outputs.tag }}
      changelog: ${{ needs.tag.outputs.changelog }}
      artifact_name: userscript
      prerelease: ${{ contains(needs.tag.outputs.tag, '-beta') }}
    secrets: inherit
    # `actions: write` — disable workflows in the public mirror
    # `contents: write` — create GitHub Release on public repo
    # `id-token: write` — Octopass token for mirror push
    permissions:
      actions: write
      contents: write
      id-token: write

  notify:
    name: Notify
    needs: [tag, mirror-and-release, deploy-static]
    if: ${{ always() && needs.mirror-and-release.result == 'success' }}
    runs-on: team-extensions
    steps:
      - name: Send Slack notification
        uses: AdGuardSoftwareLimited/actions/actions/slack@master
        with:
          channel: '#adguard-extension-vcs'
          message: ':white_check_mark: *ext-disable-amp* *${{ needs.tag.outputs.tag }}* deployed to userscripts.adtidy.org + GitHub Release — <${{ needs.mirror-and-release.outputs.release-url }}|release> | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|run>'
          color: good
